<div class="login-page">

    <mat-card>

        <h2>Accesso demo</h2>

        <mat-form-field appearance="outline">

            <mat-label>Username</mat-label>

            <input matInput [(ngModel)]="username">

        </mat-form-field>

        <button mat-raised-button color="accent" (click)="login()">

            Entra

        </button>

    </mat-card>

</div>
